name: Update Serial and Create Release

on:
  push:
    branches:
      - main
    paths:
      - 'vATIS Profile - EDGG D-ATIS Development.json'
      
permissions: write-all

jobs:
  update-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14.5

      - name: Create Release Version
        id: create_release
        run: python .github/workflows/create_release.py

      - name: Commit Release File
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add "vATIS Profile - EDGG D-ATIS.json"
          git add "vATIS Profile - EDGG D-ATIS Development.json"
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update release version with serial ${{ steps.create_release.outputs.serial }}"
            git push
          fi
